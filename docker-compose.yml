version: '3.8'

services:
  # Learning Base Service - Contains training and test data
  learningbase:
    image: devangthaker/learningbase_germancreditrisk:latest
    container_name: germancredit_learningbase
    volumes:
      - ai_system:/tmp
    command: >
      sh -c "echo '=============================================' &&
             echo '🚀 Learning Base Container Started' &&
             echo '=============================================' &&
             echo '' &&
             echo '📂 Directory Structure:' &&
             ls -laR /tmp/learningBase &&
             echo '' &&
             echo '📊 Training Data Info:' &&
             ls -lh /tmp/learningBase/train/ &&
             echo '' &&
             echo '📊 Validation Data Info:' &&
             ls -lh /tmp/learningBase/validation/ &&
             echo '' &&
             echo '📋 Training Data Sample (first 5 lines):' &&
             head -n 5 /tmp/learningBase/train/training_data.csv &&
             echo '' &&
             echo '✅ Learning Base ready for AI training' &&
             echo '=============================================' &&
             tail -f /dev/null"
    restart: unless-stopped
    networks:
      - ai_network

  # Activation Base Service - Contains single test sample
  activationbase:
    image: devangthaker/activationbase_germancreditrisk:latest
    container_name: germancredit_activationbase
    volumes:
      - ai_system:/tmp
    command: >
      sh -c "echo '=============================================' &&
             echo '🎯 Activation Base Container Started' &&
             echo '=============================================' &&
             echo '' &&
             echo '📂 Directory Contents:' &&
             ls -la /tmp/activationBase &&
             echo '' &&
             echo '📋 Activation Data:' &&
             cat /tmp/activationBase/activation_data.csv &&
             echo '' &&
             echo '✅ Activation Base ready for model testing' &&
             echo '=============================================' &&
             tail -f /dev/null"
    restart: unless-stopped
    networks:
      - ai_network

# Shared external volume for data access
volumes:
  ai_system:
    external: true

# Network for inter-container communication
networks:
  ai_network:
    driver: bridge