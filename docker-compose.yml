version: '3.8'

services:
  # Learning Base Service - Contains training and test data
  learningbase:
    image: devangthaker/learningbase_germancreditrisk:latest
    container_name: germancredit_learningbase
    volumes:
      - ai_system:/tmp
    command: >
      sh -c "echo '=============================================' &&
             echo '🚀 Learning Base Container Started' &&
             echo '=============================================' &&
             echo '' &&
             echo '📂 Directory Structure:' &&
             ls -laR /tmp/learningBase &&
             echo '' &&
             echo '📊 Training Data Info:' &&
             ls -lh /tmp/learningBase/train/ &&
             echo '' &&
             echo '📊 Validation Data Info:' &&
             ls -lh /tmp/learningBase/validation/ &&
             echo '' &&
             echo '✅ Learning Base ready for AI training' &&
             echo '=============================================' &&
             tail -f /dev/null"
    restart: unless-stopped
    networks:
      - ai_network

  # Knowledge Base Service - Contains trained AI/OLS models
  knowledgebase:
    image: devangthaker/knowledgebase_germancreditrisk:latest
    container_name: germancredit_knowledgebase
    volumes:
      - ai_system:/tmp
    command: >
      sh -c "echo '=============================================' &&
             echo '🧠 Knowledge Base Container Started' &&
             echo '=============================================' &&
             echo '' &&
             echo '📂 Available Models:' &&
             ls -lh /tmp/knowledgeBase/ &&
             echo '' &&
             echo '✅ Knowledge Base ready' &&
             echo '=============================================' &&
             tail -f /dev/null"
    restart: unless-stopped
    networks:
      - ai_network

  # Code Base Service - Contains activation data for testing
  codebase:
    image: devangthaker/codebase_germancreditrisk:latest
    container_name: germancredit_codebase
    volumes:
      - ai_system:/tmp
    command: >
      sh -c "echo '=============================================' &&
             echo '📦 Code Base Container Started' &&
             echo '=============================================' &&
             echo '' &&
             echo '📂 Activation Data Files:' &&
             ls -lh /tmp/activationBase/ &&
             echo '' &&
             echo '✅ Code Base ready for model testing' &&
             echo '=============================================' &&
             tail -f /dev/null"
    restart: unless-stopped
    networks:
      - ai_network

# Shared external volume for data access
volumes:
  ai_system:
    external: true

# Network for inter-container communication
networks:
  ai_network:
    driver: bridge