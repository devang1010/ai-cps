version: '3.8'

services:
  learningbase:
    image: devangthaker/learningbase_germancreditrisk:latest
    container_name: germancredit_learningbase
    volumes:
      - ai_system:/shared_data
    command: >
      sh -c "rm -rf /shared_data/* && 
             cp -r /tmp/learningBase /shared_data/ &&
             echo '=============================================' &&
             echo 'Learning Base Container Started' &&
             echo '=============================================' &&
             echo 'Learning Base: Data copied' &&
             tail -f /dev/null"
    restart: unless-stopped
    networks:
      - ai_network

  knowledgebase:
    image: devangthaker/knowledgebase_germancreditrisk:latest
    container_name: germancredit_knowledgebase
    depends_on:
      - learningbase
    volumes:
      - ai_system:/shared_data
    command: >
      sh -c "cp -r /tmp/knowledgeBase /shared_data/ &&
             echo '=============================================' &&
             echo 'Knowledge Base Container Started' &&
             echo '=============================================' &&
             echo 'Knowledge Base: Models copied' &&
             ls -lh /shared_data/knowledgeBase/ &&
             tail -f /dev/null"
    restart: unless-stopped
    networks:
      - ai_network

  codebase:
    image: devangthaker/codebase_germancreditrisk:latest
    container_name: germancredit_codebase
    depends_on:
      - knowledgebase
    volumes:
      - ai_system:/shared_data
    command: >
      sh -c "cp -r /tmp/activationBase /shared_data/ &&
             echo '=============================================' &&
             echo 'Code Base Container Started' &&
             echo '=============================================' &&
             echo 'Activation data copied' &&
             echo '' &&
             sleep 5 &&
             echo 'Running ANN Predictions...' &&
             python /scripts/predict_ann.py &&
             echo '' &&
             echo 'Running OLS Predictions...' &&
             python /scripts/predict_ols.py &&
             echo '=============================================' &&
             tail -f /dev/null"
    restart: unless-stopped
    networks:
      - ai_network

volumes:
  ai_system:
    external: true

networks:
  ai_network:
    driver: bridge