version: '3.8'

services:
  learningbase:
    image: devangthaker/learningbase_germancreditrisk:latest
    container_name: ols_learningbase
    volumes:
      - ai_system:/shared_data
    command: >
      sh -c "rm -rf /shared_data/* && 
             cp -r /tmp/learningBase /shared_data/ &&
             echo '✅ OLS Learning Base: Data copied to shared volume' &&
             ls -lh /shared_data/learningBase/ &&
             tail -f /dev/null"
    networks:
      - ols_network

  knowledgebase:
    image: devangthaker/knowledgebase_germancreditrisk:latest
    container_name: ols_knowledgebase
    depends_on:
      - learningbase
    volumes:
      - ai_system:/shared_data
    command: >
      sh -c "cp -r /tmp/knowledgeBase /shared_data/ &&
             echo '✅ OLS Knowledge Base: Models copied to shared volume' &&
             echo 'OLS Model Files:' &&
             ls -lh /shared_data/knowledgeBase/currentOlsSolution.pkl &&
             ls -lh /shared_data/knowledgeBase/currentOlsSolution.xml &&
             tail -f /dev/null"
    networks:
      - ols_network

  codebase:
    image: devangthaker/codebase_germancreditrisk:latest
    container_name: ols_codebase
    depends_on:
      - knowledgebase
    volumes:
      - ai_system:/shared_data
    command: >
      sh -c "cp -r /tmp/activationBase /shared_data/ &&
             echo '✅ OLS Code Base: Activation data copied to shared volume' &&
             ls -lh /shared_data/activationBase/activation_data.csv &&
             tail -f /dev/null"
    networks:
      - ols_network

volumes:
  ai_system:
    external: true

networks:
  ols_network:
    driver: bridge