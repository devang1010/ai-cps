version: '3.8'

services:
  learningbase:
    image: devangthaker/learningbase_germancreditrisk:latest
    container_name: ols_learningbase
    volumes:
      - ai_system:/shared_data
    command: >
      sh -c "rm -rf /shared_data/* && 
             cp -r /tmp/learningBase /shared_data/ &&
             echo '=============================================' &&
             echo 'OLS Learning Base Started' &&
             echo '=============================================' &&
             echo 'Data copied' &&
             tail -f /dev/null"
    networks:
      - ols_network

  knowledgebase:
    image: devangthaker/knowledgebase_germancreditrisk:latest
    container_name: ols_knowledgebase
    depends_on:
      - learningbase
    volumes:
      - ai_system:/shared_data
    command: >
      sh -c "cp -r /tmp/knowledgeBase /shared_data/ &&
             echo '=============================================' &&
             echo 'OLS Knowledge Base Started' &&
             echo '=============================================' &&
             echo 'Models copied' &&
             tail -f /dev/null"
    networks:
      - ols_network

  codebase:
    image: devangthaker/codebase_germancreditrisk:latest
    container_name: ols_codebase
    depends_on:
      - knowledgebase
    volumes:
      - ai_system:/shared_data
    command: >
      sh -c "cp -r /tmp/activationBase /shared_data/ &&
             echo '=============================================' &&
             echo 'OLS Code Base Started' &&
             echo '=============================================' &&
             echo 'Activation data copied' &&
             sleep 5 &&
             echo '' &&
             echo 'Running OLS Predictions...' &&
             python /scripts/predict_ols.py &&
             echo '=============================================' &&
             tail -f /dev/null"
    networks:
      - ols_network

volumes:
  ai_system:
    external: true

networks:
  ols_network:
    driver: bridge